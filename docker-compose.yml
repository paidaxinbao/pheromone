version: "3.8"

services:
  # ============================================================================
  # Pheromone Hub v3
  # ============================================================================
  hub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    container_name: pheromone-hub-v3
    ports:
      - "18888:18888"
    volumes:
      - hub-data:/app/data
    networks:
      - swarm-net
    restart: unless-stopped
    environment:
      MAILBOX_PORT: "18888"
      MAILBOX_HOST: "0.0.0.0"
      AGENT_STATE_MAX_CONCURRENT: "1"
      AGENT_STATE_BUSY_TIMEOUT: "300000"
      MESSAGE_QUEUE_MAX_SIZE: "50"
      SCHEDULER_INTERVAL: "500"
      BROADCAST_MAX_RECIPIENTS: "4"
      CONVERSATION_MAX_MESSAGES_5MIN: "50"
      COOLDOWN_PERIOD: "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Dashboard
  # ============================================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: pheromone-dashboard
    ports:
      - "18890:18890"
    environment:
      DASHBOARD_PORT: "18890"
      MAILBOX_URL: "http://hub:18888"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped

  # ============================================================================
  # Sci-Fi Movie Script Discussion Swarm (6 Agents)
  # ============================================================================
  
  # 1. Director (导演) - 整体把控、叙事节奏
  director:
    build:
      context: ./agent-runtime
    container_name: swarm-director
    environment:
      AGENT_ID: director
      AGENT_ROLE: director
      AGENT_DESCRIPTION: "电影导演，负责整体叙事把控、节奏指导、最终决策"
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
      OPENCLAW_MODEL: "bailian/glm-5"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped
    volumes:
      - ./workspace-swarm/director:/app/workspace

  # 2. Screenwriter (编剧) - 剧情结构、对白
  screenwriter:
    build:
      context: ./agent-runtime
    container_name: swarm-screenwriter
    environment:
      AGENT_ID: screenwriter
      AGENT_ROLE: screenwriter
      AGENT_DESCRIPTION: "编剧，负责剧情结构、场景设计、对白创作"
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
      OPENCLAW_MODEL: "bailian/glm-5"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped
    volumes:
      - ./workspace-swarm/screenwriter:/app/workspace

  # 3. Science Advisor (科学顾问) - 硬科幻设定
  science-advisor:
    build:
      context: ./agent-runtime
    container_name: swarm-science-advisor
    environment:
      AGENT_ID: science-advisor
      AGENT_ROLE: science-advisor
      AGENT_DESCRIPTION: "科学顾问，负责硬科幻设定、物理规则、技术可行性"
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
      OPENCLAW_MODEL: "bailian/qwen3.5-plus"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped
    volumes:
      - ./workspace-swarm/science-advisor:/app/workspace

  # 4. Visual Designer (视觉设计) - 场景、特效概念
  visual-designer:
    build:
      context: ./agent-runtime
    container_name: swarm-visual-designer
    environment:
      AGENT_ID: visual-designer
      AGENT_ROLE: visual-designer
      AGENT_DESCRIPTION: "视觉设计师，负责场景概念、视觉风格、特效设计"
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
      OPENCLAW_MODEL: "bailian/kimi-k2.5"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped
    volumes:
      - ./workspace-swarm/visual-designer:/app/workspace

  # 5. Character Designer (角色设计) - 人物塑造
  character-designer:
    build:
      context: ./agent-runtime
    container_name: swarm-character-designer
    environment:
      AGENT_ID: character-designer
      AGENT_ROLE: character-designer
      AGENT_DESCRIPTION: "角色设计师，负责人物塑造、性格设定、角色弧光"
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
      OPENCLAW_MODEL: "bailian/kimi-k2.5"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped
    volumes:
      - ./workspace-swarm/character-designer:/app/workspace

  # 6. Producer (制片人) - 可行性、市场分析
  producer:
    build:
      context: ./agent-runtime
    container_name: swarm-producer
    environment:
      AGENT_ID: producer
      AGENT_ROLE: producer
      AGENT_DESCRIPTION: "制片人，负责市场可行性、预算评估、观众定位"
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
      OPENCLAW_MODEL: "bailian/kimi-k2.5"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped
    volumes:
      - ./workspace-swarm/producer:/app/workspace

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  hub-data:
    driver: local

# ==============================================================================
# Networks
# ==============================================================================
networks:
  swarm-net:
    driver: bridge
