version: "3.8"

services:
  # ============================================================================
  # Pheromone Hub v3
  # ============================================================================
  hub:
    build:
      context: .
      dockerfile: Dockerfile.hub
    container_name: pheromone-hub-v3
    ports:
      - "18888:18888"
    volumes:
      - hub-data:/app/data
    networks:
      - swarm-net
    restart: unless-stopped
    environment:
      # Hub v3 Configuration
      MAILBOX_PORT: "18888"
      MAILBOX_HOST: "0.0.0.0"
      # Agent State Management
      AGENT_STATE_MAX_CONCURRENT: "1"
      AGENT_STATE_BUSY_TIMEOUT: "300000"
      # Message Queue
      MESSAGE_QUEUE_MAX_SIZE: "50"
      # Scheduler
      SCHEDULER_INTERVAL: "500"
      # Broadcast Filter
      BROADCAST_MAX_RECIPIENTS: "4"
      # Conversation Manager
      CONVERSATION_MAX_MESSAGES: "50"
      # Cooldown Manager
      COOLDOWN_PERIOD: "10000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================================================
  # Dashboard
  # ============================================================================
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: pheromone-dashboard
    ports:
      - "18890:18890"
    environment:
      DASHBOARD_PORT: "18890"
      MAILBOX_URL: "http://hub:18888"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped

  # ============================================================================
  # Orchestrator Agent (Manager)
  # ============================================================================
  orchestrator:
    build:
      context: ./agent-runtime
    container_name: orchestrator
    environment:
      AGENT_ID: orchestrator
      AGENT_ROLE: manager
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped

  # ============================================================================
  # Developer Agent
  # ============================================================================
  developer:
    build:
      context: ./agent-runtime
    container_name: developer
    environment:
      AGENT_ID: developer
      AGENT_ROLE: developer
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped

  # ============================================================================
  # Reviewer Agent
  # ============================================================================
  reviewer:
    build:
      context: ./agent-runtime
    container_name: reviewer
    environment:
      AGENT_ID: reviewer
      AGENT_ROLE: reviewer
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped

  # ============================================================================
  # Tester Agent
  # ============================================================================
  tester:
    build:
      context: ./agent-runtime
    container_name: tester
    environment:
      AGENT_ID: tester
      AGENT_ROLE: tester
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped

  # ============================================================================
  # Writer Agent (科幻编剧)
  # ============================================================================
  writer:
    build:
      context: ./agent-runtime
    container_name: writer
    environment:
      AGENT_ID: writer
      AGENT_ROLE: writer
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped

  # ============================================================================
  # Editor Agent (剧本编辑)
  # ============================================================================
  editor:
    build:
      context: ./agent-runtime
    container_name: editor
    environment:
      AGENT_ID: editor
      AGENT_ROLE: editor
      HUB_URL: http://hub:18888
      CALLBACK_PORT: "9000"
    depends_on:
      - hub
    networks:
      - swarm-net
    restart: unless-stopped

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  hub-data:
    driver: local

# ==============================================================================
# Networks
# ==============================================================================
networks:
  swarm-net:
    driver: bridge
